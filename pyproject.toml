[project]
name = "tquality-py-selenium"
version = "0.1.0"
description = "Selenium-интеграция поверх tquality-py-core"
requires-python = ">=3.12"
authors = [{name = "ООО «Точка качества»"}]
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
dependencies = [
    "tquality-py-core @ git+https://git.tquality.ru/frameworks/python/tquality-py-core.git@feature/initial-core",
    "selenium>=4.25",
    "undetected-chromedriver>=3.5",
]

[dependency-groups]
dev = [
    "mypy>=1.11",
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tquality_selenium"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.pytest.ini_options]
markers = [
    "macos: тесты требуют macOS (Safari, Edge-on-mac)",
    "windows: тесты требуют Windows",
    "linux: тесты требуют Linux",
    "safari: тесты требуют установленный Safari",
    "edge: тесты требуют установленный Edge",
]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["src/tquality_selenium", "tests"]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = [
    "undetected_chromedriver",
    "dependency_injector",
    "dependency_injector.*",
]
ignore_missing_imports = true
