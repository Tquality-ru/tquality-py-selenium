stages:
  - check
  - release

default:
  image: python:3.12-slim
  before_script:
    - pip install --quiet uv
    - uv sync --frozen || uv sync
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .venv/
      - ~/.cache/uv/

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

# Статический анализ типов - не требует браузера, Linux-runner.
mypy:
  stage: check
  script:
    - uv run mypy
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Кроссплатформенные тесты без Safari/Edge-on-mac. Linux-runner.
tests:linux:
  stage: check
  script:
    - uv run pytest -v -m "not macos and not safari and not edge" --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - report.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# macOS-specific тесты: Safari + Edge-on-mac. Только на macos-runner (tag).
tests:macos:
  stage: check
  tags:
    - macos
  image: null  # macos-runner - это shell-executor, не Docker
  before_script:
    - command -v uv >/dev/null || { echo "uv не установлен на macos-runner"; exit 1; }
    - uv sync --frozen || uv sync
  cache: []
  script:
    - uv run pytest -v -m "macos or safari or edge" --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - report.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  # Если macos-runner временно недоступен - пайплайн не падает целиком.
  allow_failure: true

mirror-to-github:
  stage: release
  image: alpine/git:latest
  before_script: []
  cache: []
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - test -n "$GITHUB_MIRROR_TOKEN" || { echo "GITHUB_MIRROR_TOKEN is not set"; exit 1; }
    - git remote add github "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/Tquality-ru/tquality-py-selenium.git"
    - git fetch --tags origin
    - git push --mirror github
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# Публикация в GitLab Package Registry на git-теге vX.Y.Z.
# Проверяет, что версия в pyproject.toml совпадает с тегом.
publish:
  stage: release
  before_script:
    - pip install --quiet uv
  cache: []
  script:
    - TAG_VERSION="${CI_COMMIT_TAG#v}"
    - PY_VERSION="$(uv run --no-sync python -c 'import tomllib,pathlib;print(tomllib.loads(pathlib.Path(\"pyproject.toml\").read_text())[\"project\"][\"version\"])')"
    - >
      test "$TAG_VERSION" = "$PY_VERSION" || {
        echo "Версия в pyproject.toml ($PY_VERSION) не совпадает с тегом ($TAG_VERSION)";
        exit 1;
      }
    - uv build
    - >
      uv publish
      --publish-url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi"
      --username gitlab-ci-token
      --password "$CI_JOB_TOKEN"
  artifacts:
    paths:
      - dist/
    expire_in: 1 month
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
